<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nina Syko | Character Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-stage">
        <div class="scanlines"></div>

        <div class="character-box">
            <img src="Nina Syko/assets/Nina Syko.jpg" alt="Nina Syko" id="nina-sprite" class="sprite-idle">
            
            <div class="shadow"></div>
        </div>

        <div class="interface">
            <h1 id="char-name">NINA SYKO</h1>
            <div class="hp-bar-container">
                <div class="hp-fill"></div>
            </div>
            <p class="status-text">STATUS: <span id="current-state">IDLE</span></p>
            
            <div class="controls-hint">
                Pressione <strong>D</strong> para Dano | <strong>S</strong> para Agachar
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
