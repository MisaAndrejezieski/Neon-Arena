<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vampire Combat | Character Selection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="arcade-overlay"></div>
    
    <div class="main-container">
        <header class="ui-header">
            <div class="player-slot p1">
                <div class="label">PLAYER 1</div>
                <div id="p1-name" class="char-name">SELECT CHARACTER</div>
            </div>
            <div class="vs-container">VS</div>
            <div class="player-slot p2">
                <div class="label">CPU</div>
                <div class="char-name">MYSTERIOUS FOE</div>
            </div>
        </header>

        <section class="preview-section">
            <div id="char-big-preview" class="big-portrait"></div>
        </section>

        <nav class="selection-grid">
            <div class="grid-item" data-char="fencer" onmouseover="updateSelection('fencer')" onclick="confirmSelection()">
                <div class="inner-card fencer-thumb"></div>
            </div>
            <div class="grid-item" data-char="noble" onmouseover="updateSelection('noble')" onclick="confirmSelection()">
                <div class="inner-card noble-thumb"></div>
            </div>
            <div class="grid-item" data-char="brawler" onmouseover="updateSelection('brawler')" onclick="confirmSelection()">
                <div class="inner-card brawler-thumb"></div>
            </div>
        </nav>

        <footer class="stats-panel">
            <div class="stat-row">
                <span>POWER</span>
                <div class="bar-container"><div id="power-bar" class="bar" style="width: 0%"></div></div>
            </div>
            <p id="char-lore">"A noite aguarda seu campeão..."</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
