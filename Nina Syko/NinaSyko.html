<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arena | Nina Syko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-stage">
        <div class="scanlines"></div>

        <div class="character-box">
            <img src="assets/Nina Syko 001.png" alt="Nina Syko" id="nina-sprite" class="sprite-idle">
            <div class="shadow"></div>
        </div>

        <div class="interface">
            <h1 id="char-name">NINA SYKO</h1>
            <div class="hp-bar-container">
                <div id="hp-fill" class="hp-fill"></div>
            </div>
            <p class="status-text">STATUS: <span id="current-state">IDLE</span></p>
            
            <div class="controls-hint">
                [A/D] Mover | [S] Agachar | [J] Chutar | [K] Levar Dano
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
